name: Build and Deploy Agentic Node

on:
  push:
    branches:
      - main 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install markdown

      - name: Run Build Script
        run: python build_html.py

      - name: Isolate Production Assets
        run: |
          # Create a temporary folder OUTSIDE of the repository root
          mkdir ../output_isolated
          
          # Copy ONLY the public-facing files into it
          cp index.html ../output_isolated/
          cp llms.txt ../output_isolated/
          cp llms-full.txt ../output_isolated/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ../output_isolated  # Point explicitly to the isolated folder
          publish_branch: gh-pages
          force_orphan: true 
